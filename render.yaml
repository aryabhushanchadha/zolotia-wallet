services:
  - type: web
    name: zolotia-wallet
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm install &&
      npm run build:mini-app
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: BROADCAST_HOUR_UTC
        value: "9"
